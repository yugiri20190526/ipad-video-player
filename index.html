<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="VideoPlayer">
<meta name="build" content="video-player-20260629-002927"><!-- CIが置換: index.htmlとsw.jsで同一のビルドID -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>VideoPlayer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #252525;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0; --text2: #888;
    --accent: #4a9eff; --accent2: #1a6fd4;
    --radius: 10px; --radius-sm: 6px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh;
    height: -webkit-fill-available; /* Safari: アドレスバーを除いた実際の高さ */
    height: 100dvh;                 /* 動的ビューポート高さ（最新Safari対応） */
    display: flex; flex-direction: column;
    overflow: hidden; -webkit-user-select: none; user-select: none;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 10px; border-bottom: 0.5px solid var(--border); flex-shrink: 0;
  }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); background: transparent;
    color: var(--text); font-size: 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: background 0.15s;
  }
  .btn:active { background: var(--bg3); }
  .btn-accent { background: var(--accent); border-color: transparent; color: #fff; }
  .btn-accent:active { background: var(--accent2); }
  .btn-danger { border-color: #ff4a4a44; color: #ff6b6b; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar {
    width: 260px; flex-shrink: 0;
    border-right: 0.5px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 10px 12px; border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .sidebar-title { font-size: 12px; color: var(--text2); }
  .video-count { font-size: 12px; color: var(--accent); font-weight: 500; }
  .video-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .video-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-bottom: 0.5px solid var(--border);
    cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.1s;
  }
  .video-item:active { background: var(--bg3); }
  .video-item.active { background: var(--bg3); border-left: 2px solid var(--accent); }
  .video-thumb {
    width: 180px; height: 113px; background: var(--bg3);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 14px; color: var(--text2);
    overflow: hidden; position: relative;
  }
  .video-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .video-thumb .play-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.4);
    font-size: 16px;
  }
  .video-meta { flex: 1; min-width: 0; }
  .video-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .video-dur { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .empty-list { padding: 2rem 1rem; text-align: center; color: var(--text2); font-size: 13px; line-height: 1.8; }
  .player-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .video-wrap {
    flex: 1; background: #000;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* メイン動画 */
  #videoEl {
    width: 100%; height: 100%; object-fit: contain;
    display: block;
    transform-origin: center center;
    will-change: transform;
    position: relative; z-index: 1;
  }

  /* スワイプ中に隣動画を表示するオーバーレイ（z-indexを高く設定） */
  #slideOverlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000; z-index: 20;
    pointer-events: none; opacity: 0;
  }
  #slideOverlay img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; display: none;
  }
  #slideOverlay video {
    width: 100%; height: 100%; object-fit: contain;
    display: block;
  }

  /* ズームリセットボタン */
  #zoomReset {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.6); color: #fff;
    border: 0.5px solid rgba(255,255,255,0.3);
    border-radius: 16px; padding: 5px 12px;
    font-size: 12px; cursor: pointer;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s; z-index: 8;
    -webkit-tap-highlight-color: transparent;
  }
  #zoomReset.show { opacity: 1; pointer-events: auto; }
  .placeholder { display: flex; flex-direction: column; align-items: center; gap: 12px; color: var(--text2); }
  .placeholder svg { opacity: 0.3; }
  .placeholder p { font-size: 14px; }
  .controls {
    flex-shrink: 0; background: var(--bg2);
    border-top: 0.5px solid var(--border);
    padding: 30px 16px calc(14px + env(safe-area-inset-bottom));
  }
  .seek-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 40px;
    touch-action: none;
  }
  .time { font-size: 12px; color: var(--text2); white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 38px; }
  input[type=range] {
    flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
    background: var(--border2); border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }
  /* つまみ(42px)を入力ボックス内に収め、iOSで動画へはみ出さないようにする
     入力の高さ=つまみ径、細いバーはrunnable-trackで描画、つまみは負マージンでトラック中央へ */
  #seekBar { height: 42px; background: transparent; }
  #seekBar::-webkit-slider-runnable-track {
    height: 12px; border-radius: 6px;
    background: linear-gradient(to right, var(--accent) var(--seek-pct, 0%), var(--border2) var(--seek-pct, 0%));
  }
  #seekBar::-webkit-slider-thumb { width: 42px; height: 42px; margin-top: -15px; }
  .ctrl-row { display: flex; align-items: center; justify-content: space-between; }
  .ctrl-center { display: flex; align-items: center; gap: 16px; }
  .ctrl-right { display: flex; align-items: center; gap: 8px; }
  .vol-wrap { display: flex; align-items: center; gap: 6px; }
  #volBar { width: 70px; }
  .nav-btn {
    width: 81px; height: 81px; border-radius: 50%;
    border: 0.5px solid var(--border2); background: transparent; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.15s;
    flex-shrink: 0;
  }
  .nav-btn:active { background: var(--bg3); }
  .play-main {
    width: 81px; height: 81px; border-radius: 50%;
    background: var(--accent); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.15s;
    flex-shrink: 0;
  }
  .play-main:active { background: var(--accent2); }
  .skip-btn {
    background: none; border: none; color: var(--text2);
    font-size: 13px; font-weight: 500; cursor: pointer; padding: 8px;
    -webkit-tap-highlight-color: transparent;
    display: flex; flex-direction: column; align-items: center; gap: 1px;
  }
  .skip-btn svg { display: block; }
  .skip-btn span { font-size: 9px; }
  .btn-icon {
    padding: 8px; border: none; background: transparent;
    color: var(--text2); cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .btn-icon:active { color: var(--text); }
  @media (max-width: 600px) { .sidebar { width: 200px; } }
  @media (max-width: 480px) { .sidebar { display: none; } }
  .video-list::-webkit-scrollbar { width: 4px; }
  .video-list::-webkit-scrollbar-track { background: transparent; }
  .video-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); border: 0.5px solid var(--border2);
    color: var(--text); padding: 10px 18px; border-radius: 20px;
    font-size: 13px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s; z-index: 100; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  #fileInput { display: none; }

  /* ===== 追加進捗オーバーレイ ===== */
  .progress-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
    display: none; align-items: center; justify-content: center;
  }
  .progress-overlay.show { display: flex; }
  .progress-box {
    background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: 16px; padding: 24px 28px; width: 78%; max-width: 320px;
    text-align: center;
  }
  .progress-label {
    font-size: 13px; color: var(--text2); margin-bottom: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .progress-track { height: 8px; background: var(--border2); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 4px; transition: width 0.2s ease; }
  .progress-pct { margin-top: 12px; font-size: 24px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; }

  /* ===== スワイプインジケーター ===== */
  .swipe-hint {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7); color: #fff;
    padding: 12px 22px; border-radius: 24px;
    font-size: 15px; font-weight: 500;
    pointer-events: none; opacity: 0;
    transition: opacity 0.15s; z-index: 10;
    white-space: nowrap;
  }
  .swipe-hint.show { opacity: 1; }
  .swipe-arrow {
    position: absolute; top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.25);
    font-size: 28px; pointer-events: none;
    transition: opacity 0.2s;
  }
  .swipe-arrow.left { left: 12px; }
  .swipe-arrow.right { right: 12px; }

  /* 動画上に被せる透明スワイプ受付レイヤー */
  #swipeLayer {
    position: absolute; inset: 0;
    z-index: 5;
    background: transparent;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
</style>
</head>
<body>

<div class="header">
  <h1>▶ VideoPlayer</h1>
  <div class="header-actions">
    <button class="btn btn-accent" id="addBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      動画を追加
    </button>
    <button class="btn btn-danger" id="clearBtn">全削除</button>
    <input type="file" id="fileInput" accept="video/mp4,video/quicktime,video/x-m4v,video/avi,video/webm,video/x-matroska" multiple>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">保存済み動画</span>
      <span class="video-count" id="videoCount">0本</span>
    </div>
    <div class="video-list" id="videoList">
      <div class="empty-list">「動画を追加」で<br>ファイルを選択してください<br><br>複数選択に対応しています</div>
    </div>
  </div>

  <div class="player-area">
    <div class="video-wrap" id="videoWrap">
      <video id="videoEl" playsinline webkit-playsinline></video>
      <div id="slideOverlay"><img id="slideThumb" alt=""><video id="slideVideo" playsinline webkit-playsinline muted></video></div>
      <div id="swipeLayer"></div>
      <div class="swipe-arrow left" id="arrowLeft">‹</div>
      <div class="swipe-arrow right" id="arrowRight">›</div>
      <div class="swipe-hint" id="swipeHint"></div>
      <button id="zoomReset">× リセット</button>
      <div class="placeholder" id="placeholder">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/>
        </svg>
        <p>動画を選択してください</p>
      </div>
    </div>

    <div class="controls">
      <div class="seek-row">
        <span class="time" id="currentTime">0:00</span>
        <input type="range" id="seekBar" min="0" max="100" step="0.1" value="0">
        <span class="time" style="text-align:right" id="duration">0:00</span>
      </div>
      <div class="ctrl-row">
        <div style="width:84px;"></div>
        <div class="ctrl-center">
          <button class="nav-btn" id="prevBtn" aria-label="前の動画">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
            </svg>
          </button>
          <button class="play-main" id="playBtn" aria-label="再生・一時停止">
            <svg id="playIcon" width="36" height="36" viewBox="0 0 24 24" fill="white">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
          </button>
          <button class="nav-btn" id="nextBtn" aria-label="次の動画">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
            </svg>
          </button>
        </div>
        <div class="ctrl-right">
          <button class="btn" id="repeatBtn" style="padding:8px 10px;" title="リピート">
            <svg id="repeatIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
          </button>
          <button class="btn" id="loopBtn" style="padding:8px 10px;" title="プレイリスト周回">
            <svg id="loopIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" opacity="0.4">
              <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box">
    <div class="progress-label" id="progressLabel">追加中…</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>
</div>

<script>
const DB_NAME = 'videoPlayerDB3', STORE = 'videos', DB_VER = 1; // 既存v2DBとの版数衝突を避け新規DBで開始
const THUMB_VER = 3; // サムネイル生成ロジックのバージョン（上げると旧サムネを再生成）
const THUMB_W = 320, THUMB_H = 200; // 高画質化: 表示120x75の約2.7x（Retina対応）。アスペクトは表示枠と同じ1.6
const THUMB_Q = 0.85;               // JPEG品質
let db, videos = [], currentIdx = -1;
let loopMode = true;        // プレイリスト周回（前/次/スワイプ/末尾で先頭へ）。既定ON
let repeatMode = 'one';     // 終了時の挙動: 'one'=同じ動画をリピート(既定) / 'next'=次の動画へ

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = () => rej('DB error');
  });
}

function getAllVideos() {
  return new Promise(res => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).getAll();
    req.onsuccess = () => {
      const list = req.result || [];
      // ファイル名の昇順（数字は自然順：file2 < file10）
      list.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
      res(list);
    };
  });
}

function generateThumb(blob) {
  return new Promise(res => {
    const v = document.createElement('video');
    v.muted = true; v.defaultMuted = true; v.playsInline = true;
    v.setAttribute('muted', ''); v.setAttribute('playsinline', ''); v.setAttribute('webkit-playsinline', '');
    v.preload = 'auto';
    // iOS Safari は DOM 内で実サイズを持つ動画でないとフレームを描画しないことがある
    v.style.cssText = 'position:fixed;left:-9999px;top:0;width:120px;height:68px;opacity:0.01;pointer-events:none;';
    document.body.appendChild(v);

    const url = URL.createObjectURL(blob);
    v.src = url;

    let settled = false;
    // タイムアウト時も、フレームが読めていれば最後の手段でキャプチャ（seeked/timeupdate不発の救済）
    const timer = setTimeout(() => { if (!settled && v.videoWidth) draw(); else finish(null); }, 12000);

    function finish(result) {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      try { v.pause(); } catch (e) {}
      URL.revokeObjectURL(url);
      v.removeAttribute('src');
      try { v.load(); } catch (e) {}
      if (v.parentNode) v.parentNode.removeChild(v);
      res(result);
    }

    function draw() {
      try {
        const c = document.createElement('canvas');
        c.width = THUMB_W; c.height = THUMB_H;
        const ctx = c.getContext('2d');
        ctx.imageSmoothingQuality = 'high';
        const vw = v.videoWidth, vh = v.videoHeight;
        if (vw && vh) {
          // アスペクト比を保持して中央クロップ（CSSのobject-fit:coverと一致／歪み防止）
          const targetAR = THUMB_W / THUMB_H, srcAR = vw / vh;
          let sw, sh, sx, sy;
          if (srcAR > targetAR) { sh = vh; sw = vh * targetAR; sx = (vw - sw) / 2; sy = 0; }
          else { sw = vw; sh = vw / targetAR; sx = 0; sy = (vh - sh) / 2; }
          ctx.drawImage(v, sx, sy, sw, sh, 0, 0, THUMB_W, THUMB_H);
        } else {
          ctx.drawImage(v, 0, 0, THUMB_W, THUMB_H);
        }
        finish(c.toDataURL('image/jpeg', THUMB_Q));
      } catch (e) { finish(null); }
    }

    v.addEventListener('loadeddata', async () => {
      const d = v.duration;
      // duration が不明/無限大なら先頭付近、分かれば10%地点（最大3秒）
      const target = (isFinite(d) && d > 0) ? Math.min(3, d * 0.1) : 0.1;
      // iOS は一度再生しないとフレームをデコードしないため muted 再生で起こす
      try { await v.play(); } catch (e) {}
      let grabbed = false;
      const grab = () => {
        if (grabbed) return; grabbed = true;
        try { v.pause(); } catch (e) {}
        requestAnimationFrame(() => requestAnimationFrame(draw));
      };
      v.addEventListener('seeked', grab, { once: true });
      // seeked が来ない動画向けの保険：再生で進んだフレームを使う
      v.addEventListener('timeupdate', () => { if (v.currentTime > 0.05) grab(); }, { once: true });
      try { v.currentTime = target; } catch (e) { grab(); }
    });

    v.addEventListener('error', () => finish(null));
  });
}

function addVideoOnce(name, blob, thumb) {
  return new Promise((resolve, reject) => {
    let tx, req;
    try {
      tx = db.transaction(STORE, 'readwrite');
      req = tx.objectStore(STORE).add({ name, blob, thumb, thumbVer: THUMB_VER, addedAt: Date.now() });
    } catch (e) { return reject(e); }
    req.onsuccess = () => resolve(req.result);
    req.onerror = (ev) => { if (ev && ev.preventDefault) ev.preventDefault(); reject(req.error || new Error('add failed')); };
    tx.onabort = () => reject(tx.error || new Error('transaction aborted'));
  });
}

// iOSのIndexedDBはBlob保存が散発的にUnknownErrorになる（端末状態/メモリ依存）。
// 少し間を置いて数回リトライすると通るので、成功するまで再試行する。成功:id / 最終失敗:null
async function addVideo(name, blob) {
  const thumb = await generateThumb(blob);
  for (let attempt = 0; attempt < 5; attempt++) {
    if (attempt > 0) await new Promise(r => setTimeout(r, 300 * attempt)); // 失敗後は間を置く（状態回復待ち）
    try { return await addVideoOnce(name, blob, thumb); }
    catch (e) { /* リトライ */ }
  }
  return null; // 数回試しても保存できず
}

// 1件のサムネイルをDBに保存（再生成結果の永続化）
function saveThumb(id, thumb, tries) {
  return new Promise(res => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.oncomplete = () => res();
    tx.onerror = () => res();
    const store = tx.objectStore(STORE);
    const g = store.get(id);
    g.onsuccess = () => {
      const r = g.result;
      if (r) { r.thumb = thumb; r.thumbVer = THUMB_VER; r.thumbTries = tries || 0; store.put(r); }
    };
  });
}

const MAX_THUMB_TRIES = 4; // 未生成サムネを諦めるまでの再試行回数（複数回のアプリ起動にまたがる）

// 旧バージョン（要再生成）＋ 未生成で再試行上限未満のものを高画質で背景再生成して自己修復
async function backfillThumbs() {
  const targets = videos.filter(v =>
    (v.thumbVer || 0) < THUMB_VER ||                      // 生成ロジック更新 → 作り直し
    (!v.thumb && (v.thumbTries || 0) < MAX_THUMB_TRIES)); // 未生成 → 数回まで再挑戦
  for (const v of targets) {
    const newThumb = await generateThumb(v.blob);
    if (newThumb) { v.thumb = newThumb; v.thumbTries = 0; }   // 成功
    else { v.thumbTries = (v.thumbTries || 0) + 1; }          // 失敗回数を記録（既存サムネは保持）
    v.thumbVer = THUMB_VER;
    await saveThumb(v.id, v.thumb || null, v.thumbTries);
    if (newThumb) {                   // 取得できたものから順次UIへ反映
      const idx = videos.indexOf(v);
      const cell = idx >= 0 && document.querySelector('.video-item[data-idx="' + idx + '"] .video-thumb');
      if (cell) cell.innerHTML = '<img src="' + newThumb + '" alt="">' + (idx === currentIdx ? '<div class="play-overlay">▶</div>' : '');
    }
  }
}

function clearAll() {
  return new Promise(res => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).clear();
    tx.oncomplete = () => res();
  });
}

function formatTime(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return m + ':' + String(s).padStart(2,'0');
}

function stopVideo() {
  if (videoEl._objectURL) { URL.revokeObjectURL(videoEl._objectURL); videoEl._objectURL = null; }
  videoEl.pause(); videoEl.src = '';
  if (videoEl._clearSlide) videoEl._clearSlide(); else videoEl.style.transform = '';
  videoEl.style.visibility = 'visible';
  slideOverlay.style.opacity = '0';
  slideOverlay.style.transform = '';
  if (slideVideo._objectURL) { URL.revokeObjectURL(slideVideo._objectURL); slideVideo._objectURL = null; }
  slideVideo.src = '';
  slideThumb.src = ''; slideThumb.style.display = 'none';
  placeholder.style.display = 'flex';
  currentIdx = -1;
  seekBar.value = 0;
  seekBar.style.setProperty('--seek-pct', '0%');
  currentTimeEl.textContent = '0:00';
  durationEl.textContent = '0:00';
  updatePlayIcon(true);
  renderList();
}

async function playVideo(idx) {
  if (idx < 0 || idx >= videos.length) return;
  currentIdx = idx;
  const v = videos[idx];
  if (videoEl._clearSlide) videoEl._clearSlide(); else videoEl.style.transform = '';
  videoEl.style.visibility = 'visible';
  slideOverlay.style.opacity = '0';
  slideOverlay.style.transform = '';
  if (videoEl._objectURL) URL.revokeObjectURL(videoEl._objectURL);
  const url = URL.createObjectURL(v.blob);
  videoEl._objectURL = url;
  videoEl.src = url;
  videoEl.loop = (repeatMode === 'one'); // 同じ動画リピートはネイティブloopで
  videoEl.load();
  placeholder.style.display = 'none';
  try { await videoEl.play(); } catch(e) {}
  updatePlayIcon(false);
  renderList();
  const activeEl = document.querySelector('.video-item.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

videoEl.addEventListener('timeupdate', () => {
  if (!videoEl.duration) return;
  const pct = (videoEl.currentTime / videoEl.duration) * 100;
  seekBar.value = pct;
  seekBar.style.setProperty('--seek-pct', pct.toFixed(1) + '%');
  currentTimeEl.textContent = formatTime(videoEl.currentTime);
});

videoEl.addEventListener('loadedmetadata', () => {
  durationEl.textContent = formatTime(videoEl.duration);
  if (currentIdx >= 0 && videos[currentIdx]) {
    videos[currentIdx].dur = formatTime(videoEl.duration);
    const el = document.getElementById('dur-' + currentIdx);
    if (el) el.textContent = formatTime(videoEl.duration);

});

videoEl.addEventListener('ended', () => {
  // repeatMode 'one' は videoEl.loop=true でシームレスにループする（'ended'は発火しない）。
  // ここに来るのは 'next' モードのみ → 次の動画へ（末尾は loopMode なら先頭へ）
  updatePlayIcon(true);
  const nextIdx = currentIdx < videos.length - 1 ? currentIdx + 1 : (loopMode ? 0 : -1);
  if (nextIdx >= 0) playVideo(nextIdx);
});
videoEl.addEventListener('play', () => updatePlayIcon(false));
videoEl.addEventListener('pause', () => updatePlayIcon(true));

seekBar.addEventListener('input', () => {
  if (videoEl.duration) videoEl.currentTime = (seekBar.value / 100) * videoEl.duration;
});

document.getElementById('playBtn').addEventListener('click', () => {

});

document.getElementById('prevBtn').addEventListener('click', () => {

});

document.getElementById('addBtn').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', async e => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  const total = files.length;
  let added = 0, skipped = 0, failed = 0;
  showProgress(true);
  setProgress(0, '追加の準備中…');
  try {
    for (let i = 0; i < total; i++) {
      const file = files[i];
      const label = `追加中 (${i + 1}/${total})  ${file.name}`;
      setProgress((i / total) * 100, label);          // ファイル処理開始時点
      if (videos.some(v => v.name === file.name)) {
        skipped++;                                     // 既に保存済み（同名）
      } else {
        const id = await addVideo(file.name, file);    // サムネ生成＋DB保存（内部でリトライ）
        if (id != null) added++; else failed++;
      }
      setProgress(((i + 1) / total) * 100, label);     // ファイル完了
      await new Promise(r => setTimeout(r));           // 1件ごとに譲ってGC・IDB負荷を軽減
    }
    // 再生中の動画はソート後も同じものを指すようIDで引き直す
    const curId = currentIdx >= 0 && videos[currentIdx] ? videos[currentIdx].id : null;
    videos = await getAllVideos();
    if (curId != null) currentIdx = videos.findIndex(v => v.id === curId);
    renderList();
    setProgress(100, failed ? `完了（${failed}件失敗）` : '完了');
  } finally {
    setTimeout(() => showProgress(false), 350); // 100%を一瞬見せてから閉じる
    e.target.value = '';
  }
  // 実態どおりに通知（失敗があれば再取り込みで埋められる旨も伝える）
  let msg = `${added}件追加`;
  if (skipped) msg += ` / 重複${skipped}件`;
  if (failed) msg += ` / 失敗${failed}件（もう一度「動画を追加」で同じ動画を選ぶと残りが入ります）`;
  showToast(msg);
  backfillThumbs(); // 追加時に生成失敗したサムネがあれば再生成
});

document.getElementById('clearBtn').addEventListener('click', async () => {
  if (!videos.length) return;
  if (!confirm('保存済みの動画をすべて削除しますか？')) return;
  stopVideo();
  await clearAll();
  videos = [];
  renderList();
  showToast('すべて削除しました');
});

// ===== スライドスワイプ ＋ ピンチズーム =====
(function() {
  const layer   = document.getElementById('swipeLayer');
  const hint    = document.getElementById('swipeHint');
  const arrowL  = document.getElementById('arrowLeft');
  const arrowR  = document.getElementById('arrowRight');
  const wrap    = document.getElementById('videoWrap');
  const zoomBtn = document.getElementById('zoomReset');

  // ズーム状態
  let scale = 1, panX = 0, panY = 0;
  let slideX = 0; // スワイプの水平オフセット（transformで合成しGPU描画）
  let pinching = false, initDist = 0, initScale = 1;
  let initPanX = 0, initPanY = 0, pinchCx = 0, pinchCy = 0;

  // スワイプ状態
  let startX = 0, startY = 0, moved = false, ignored = false, active = false;
  const THRESHOLD   = 45;
  const MAX_Y       = 55;
  const EDGE_MARGIN = 40;

  function applyZoom() {
    // スワイプ(translateX)とズーム(scale+pan)を1つのtransformに合成（GPU合成で滑らか）
    videoEl.style.transform = `translateX(${slideX}px) scale(${scale}) translate(${panX / scale}px, ${panY / scale}px)`;
    zoomBtn.classList.toggle('show', scale > 1.05);
  }

  function resetZoom() {
    scale = 1; panX = 0; panY = 0; slideX = 0;
    videoEl.style.transition = 'none'; // transition不要、即リセット
    applyZoom();
    zoomBtn.classList.remove('show');
  }

  zoomBtn.addEventListener('click', resetZoom);

  // IIFE外（playVideo/stopVideo）からスライド位置だけ即リセットするための公開関数
  videoEl._clearSlide = () => { slideX = 0; videoEl.style.transition = 'none'; applyZoom(); };

  // トリプルタップ（3連続タップ）で拡大を標準サイズに戻す。
  // 戻り値 true = この タップで解除した（再生/一時停止を行わない）
  let tapCount = 0, lastTapTime = 0;
  function registerTap() {
    const now = Date.now();
    tapCount = (now - lastTapTime < 400) ? tapCount + 1 : 1; // 400ms以内の連続タップを数える
    lastTapTime = now;
    if (tapCount >= 3 && scale > 1.05) {
      tapCount = 0;
      resetZoom();
      showToast('標準サイズに戻しました');
      return true;
    }
    return false;
  }

  function getDist(t) {
    const dx = t[0].clientX - t[1].clientX;
    const dy = t[0].clientY - t[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  function getMid(t) {
    return {
      x: (t[0].clientX + t[1].clientX) / 2,
      y: (t[0].clientY + t[1].clientY) / 2
    };
  }

  function showHint(msg) {
    hint.textContent = msg;
    hint.classList.add('show');
    clearTimeout(hint._t);
    hint._t = setTimeout(() => hint.classList.remove('show'), 900);
  }

  function resetArrows() {
    arrowL.style.opacity = '0.25';
    arrowR.style.opacity = '0.25';
  }

  function getWrapWidth() { return wrap.offsetWidth; }

  // 新動画の「実フレーム」が描画されるまで待つ（前動画の残フレーム対策）
  function nextPaintedFrame(video) {
    return new Promise(res => {
      let done = false;
      const finish = () => { if (!done) { done = true; res(); } };
      if ('requestVideoFrameCallback' in video) {
        video.requestVideoFrameCallback(() => finish());
      } else { // 旧Safari保険：canplay後にrAF2回
        video.addEventListener('canplay',
          () => requestAnimationFrame(() => requestAnimationFrame(finish)), { once: true });
      }
      setTimeout(finish, 1000); // タイムアウト保険
    });
  }

  // 次(dir=1)/前(dir=-1)の動画へスライド遷移
  function slideTo(idx, dir) {
    const W = getWrapWidth();
    // メイン動画をスライドアウト、オーバーレイを中央へ（どちらもtransformでGPU合成）
    videoEl.style.transition = 'transform 0.45s ease-in-out';
    slideX = (dir > 0 ? W : -W); applyZoom();
    slideOverlay.style.transition = 'transform 0.45s ease-in-out';
    slideOverlay.style.transform = 'translateX(0)';
    setTimeout(async () => {
      videoEl.style.transition = '';
      slideX = 0; // 位置リセット（この後hiddenにしてからresetZoomで確定）
      videoEl.style.visibility = 'hidden'; // 差替中は完全に非表示
      videoEl.pause();
      if (videoEl._objectURL) URL.revokeObjectURL(videoEl._objectURL);
      const url = URL.createObjectURL(videos[idx].blob);
      videoEl._objectURL = url;
      videoEl.src = url;
      videoEl.load();
      currentIdx = idx;
      resetZoom();
      try { await videoEl.play(); } catch(e) {}
      // 新動画の実フレームが描画されるまで待ってから表示（残フレーム対策の要）
      await nextPaintedFrame(videoEl);
      updatePlayIcon(false);
      renderList();
      const activeEl = document.querySelector('.video-item.active');
      if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      videoEl.style.visibility = 'visible';
      slideOverlay.style.transition = 'opacity 0.12s ease';
      slideOverlay.style.opacity = '0';
      setTimeout(() => {
        slideOverlay.style.transition = '';
        slideOverlay.style.transform = '';
        slideVideo.src = '';
        if (slideVideo._objectURL) { URL.revokeObjectURL(slideVideo._objectURL); slideVideo._objectURL = null; }
        slideThumb.src = ''; slideThumb.style.display = 'none';
      }, 180);
    }, 460);
  }

  function onStart(e) {
    if (e.touches.length === 2) {
      // ピンチ開始
      pinching = true;
      active = false;
      initDist  = getDist(e.touches);
      initScale = scale;
      initPanX  = panX;
      initPanY  = panY;
      const mid = getMid(e.touches);
      const rect = wrap.getBoundingClientRect();
      pinchCx = mid.x - rect.left - rect.width / 2;
      pinchCy = mid.y - rect.top  - rect.height / 2;
      e.preventDefault();
      return;
    }
    if (pinching) return;

    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    const sw = window.innerWidth;

    if (scale > 1.05) {
      active = false; ignored = false;
      startX = x; startY = y;
      initPanX = panX; initPanY = panY;
      e.preventDefault();
      return;
    }

    if (x < EDGE_MARGIN || x > sw - EDGE_MARGIN) { ignored = true; active = false; return; }
    ignored = false; active = true; moved = false;
    startX = x; startY = y;
    e.preventDefault();
  }

  function onMove(e) {
    if (e.touches.length === 2 && pinching) {
      e.preventDefault();
      const newDist = getDist(e.touches);
      let newScale = initScale * (newDist / initDist);
      newScale = Math.max(1, Math.min(5, newScale));

      const ratio = newScale / initScale;
      panX = pinchCx - ratio * (pinchCx - initPanX);
      panY = pinchCy - ratio * (pinchCy - initPanY);

      const maxPan = (newScale - 1) * wrap.offsetWidth / 2;
      panX = Math.max(-maxPan, Math.min(maxPan, panX));
      panY = Math.max(-maxPan, Math.min(maxPan, panY));

      scale = newScale;
      videoEl.style.transition = 'none';
      applyZoom();
      return;
    }

    // ズーム中の1本指パン
    if (scale > 1.05 && e.touches.length === 1) {
      e.preventDefault();
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      const maxPan = (scale - 1) * wrap.offsetWidth / 2;
      panX = Math.max(-maxPan, Math.min(maxPan, initPanX + dx));
      panY = Math.max(-maxPan, Math.min(maxPan, initPanY + dy));
      videoEl.style.transition = 'none';
      applyZoom();
      return;
    }

    if (!active || ignored) return;
    e.preventDefault();
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > 8) {
      if (!moved) {
        // スワイプ開始時に隣動画をオーバーレイにロード
        const neighborIdx = dx > 0
          ? (currentIdx < videos.length - 1 ? currentIdx + 1 : (loopMode ? 0 : -1))   // 左→右 = 次
          : (currentIdx > 0 ? currentIdx - 1 : (loopMode ? videos.length - 1 : -1));   // 右→左 = 前
        if (neighborIdx >= 0 && videos[neighborIdx]) {
          // サムネイルを即座に表示して黒い瞬間を防ぐ
          if (videos[neighborIdx].thumb) {
            slideThumb.src = videos[neighborIdx].thumb;
            slideThumb.style.display = 'block';
          } else {
            slideThumb.style.display = 'none';
          }
          if (slideVideo._objectURL) URL.revokeObjectURL(slideVideo._objectURL);
          const url = URL.createObjectURL(videos[neighborIdx].blob);
          slideVideo._objectURL = url;
          slideVideo.src = url;
          slideVideo.load();
        }
      }
      moved = true;
      const W = wrap.offsetWidth;
      videoEl.style.transition = 'none';
      slideX = dx; applyZoom();            // transformで追従（GPU合成・再レイアウトなし）
      if (dx > 0) {
        slideOverlay.style.transform = `translateX(${dx - W}px)`;
      } else {
        slideOverlay.style.transform = `translateX(${dx + W}px)`;
      }
      slideOverlay.style.opacity = '1';
      arrowL.style.opacity = dx > 0 ? '0.9' : '0.25';
      arrowR.style.opacity = dx < 0 ? '0.9' : '0.25';
    }
  }

  function cancelSlide() {
    videoEl.style.transition = 'transform 0.35s ease-out';
    slideX = 0; applyZoom(); // 元位置へスムーズに戻す
    slideOverlay.style.transition = 'transform 0.35s ease, opacity 0.35s';
    slideOverlay.style.opacity = '0';
    setTimeout(() => {
      videoEl.style.transition = '';
      slideOverlay.style.transition = '';
      slideVideo.src = '';
      slideThumb.src = ''; slideThumb.style.display = 'none';
    }, 360);
  }

  function onCancel() {
    resetArrows();
    pinching = false;
    cancelSlide();
    active = false; moved = false; ignored = false;
  }

  async function onEnd(e) {
    // ピンチ終了
    if (pinching && e.touches.length < 2) {
      pinching = false;
      if (scale < 1.05) resetZoom();
      return;
    }
    if (pinching) return;

    // ズーム中パンモード終了（タップのみ再生/停止）
    if (scale > 1.05) {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) < 8 && Math.abs(dy) < 8 && videoEl.src) {
        if (!registerTap()) { videoEl.paused ? videoEl.play() : videoEl.pause(); } // 3連続なら解除
      }
      return;
    }

    resetArrows();
    if (!active || ignored) { ignored = false; active = false; return; }
    active = false;

    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;

    // タップ
    if (!moved || Math.abs(dx) < 10) {
      cancelSlide();
      if (Math.abs(dx) < 10 && Math.abs(dy) < 10 && videoEl.src) {
        if (!registerTap()) { videoEl.paused ? videoEl.play() : videoEl.pause(); } // 3連続なら解除（拡大時のみ）
      }
      moved = false; return;
    }

    if (Math.abs(dy) > MAX_Y) {
      cancelSlide();
      moved = false; return;
    }

    if (dx > THRESHOLD) {              // 左→右 = 次の動画
      const idx = currentIdx < videos.length - 1 ? currentIdx + 1 : (loopMode ? 0 : -1);
      if (idx >= 0) { slideTo(idx, 1); }
      else cancelSlide();
    } else if (dx < -THRESHOLD) {      // 右→左 = 前の動画
      const idx = currentIdx > 0 ? currentIdx - 1 : (loopMode ? videos.length - 1 : -1);
      if (idx >= 0) { slideTo(idx, -1); }
      else cancelSlide();
    } else {
      cancelSlide();
    }
    moved = false;
  }

  const opts = { passive: false };
  layer.addEventListener('touchstart',  onStart,  opts);
  layer.addEventListener('touchmove',   onMove,   opts);
  layer.addEventListener('touchend',    onEnd,    { passive: true });
  layer.addEventListener('touchcancel', onCancel, { passive: true });
})();

openDB().then(async () => {
  videos = await getAllVideos();
  renderList();
  if (videos.length) showToast(videos.length + '件の動画が保存されています');
  backfillThumbs(); // 保存済みでサムネ欠けの動画を背景で再生成
});
</script>

<div id="ver" style="position:fixed;bottom:4px;right:8px;font-size:11px;color:#555;z-index:999;pointer-events:none;"></div>
<script>
  // ロード済みドキュメントのビルドIDを表示（＝実際に動いているコードのバージョン）
  // CIが <meta name="build"> と sw.js の CACHE を同一値に書き換える
  (function () {
    const b = document.querySelector('meta[name="build"]');
    document.getElementById('ver').textContent = (b && b.content) ? b.content : '不明';
  })();
</script>
