name: Update Service Worker Version

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'sw.js'

jobs:
  update-sw:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Stamp build version into sw.js and index.html
        env:
          TZ: Asia/Tokyo
        run: |
          VERSION=video-player-$(date +"%Y%m%d-%H%M%S")
          sed -i "s/const CACHE = 'video-player-[^']*'/const CACHE = '${VERSION}'/" sw.js
          sed -i "s/<meta name=\"build\" content=\"video-player-[^\"]*\">/<meta name=\"build\" content=\"${VERSION}\">/" index.html
          echo "Stamped: ${VERSION}"

      - name: Commit stamped files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js index.html
          # [skip ci] でこのbotコミットによる再トリガー（無限ループ）を防止
          git diff --staged --quiet || git commit -m "chore: stamp build version [skip ci]"
          git push
