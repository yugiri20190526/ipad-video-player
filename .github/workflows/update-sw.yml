name: Update Service Worker Version

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'sw.js'

jobs:
  update-sw:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update SW cache version with timestamp
        env:
          TZ: Asia/Tokyo
        run: |
          VERSION=$(date +"%Y%m%d-%H%M%S")
          sed -i "s/const CACHE = 'video-player-[^']*'/const CACHE = 'video-player-${VERSION}'/" sw.js
          echo "Updated to: video-player-${VERSION}"

      - name: Commit updated sw.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet || git commit -m "chore: update SW cache version"
          git push
